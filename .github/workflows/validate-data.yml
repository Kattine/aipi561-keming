name: Data Quality Check

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]
    paths:
      - 'week3/data/**'
      - 'week3/validation/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull --include="week3/data/demand_enriched_corrupted.parquet"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy lightgbm>=4.5.0 pytest

      - name: Run data quality validation
        id: validate
        run: |
          cd week3
          python -m validation.check_data_quality

      - name: Run validation unit tests
        run: |
          cd week3
          python -m pytest validation/test_data_quality.py -v --tb=short

      - name: Block deployment if validation fails
        if: failure()
        run: |
          echo "Data validation FAILED - deployment blocked."
          exit 1

      - name: Validation passed
        if: success()
        run: echo "Data quality validation passed - safe to deploy."
